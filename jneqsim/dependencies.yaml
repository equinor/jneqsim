# NeqSim Dependency Configuration
# This file defines how to resolve NeqSim Java dependencies

neqsim:
  # Version to use ("latest" or specific version like "2.5.25")
  version: "latest"
  
  # Dependency sources (checked in order)
  sources:
    # Maven Central (checked first if available)
    maven:
      enabled: true
      coordinates:
        # NeqSim is not yet in Maven Central, but when it is:
        - groupId: "no.ntnu.neqsim"
          artifactId: "neqsim-core"
          
    # GitHub Releases (fallback/primary source)
    github:
      enabled: true
      repository: "equinor/neqsim"
      base_url: "https://github.com/equinor/neqsim/releases/download"
      # JAR file patterns for different Java versions
      assets:
        java8: "neqsim-{version}-Java8.jar"
        java11: "neqsim-{version}.jar"  # Default Java 11+ version
        java21: "neqsim-{version}-Java21.jar"

# Caching configuration
cache:
  # Cache directory (supports ~ expansion)
  directory: "~/.cache/jneqsim"
  
  # Verify file integrity using SHA-256
  verify_integrity: true
  
  # Maximum cache size (in MB) - oldest files removed first
  max_size_mb: 500
  
  # Cache TTL in days (0 = never expire)
  ttl_days: 30

# Logging configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  show_progress: true